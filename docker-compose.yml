services:
  local-stack-aws:
    image: localstack/localstack:community-archive
    networks:
      - hmpps
    container_name: local-stack-aws-vsip-orc
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,sns
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"

networks:
  hmpps:
